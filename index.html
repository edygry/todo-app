<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }
    .app { width: 100%; max-width: 480px; }
    h1 { font-size: 28px; font-weight: 600; margin-bottom: 24px; color: #111; }
    .input-row { display: flex; gap: 8px; margin-bottom: 24px; }
    .input-row input {
      flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px;
      font-size: 16px; outline: none;
    }
    .input-row input:focus { border-color: #4a90d9; }
    .input-row button {
      padding: 12px 20px; background: #4a90d9; color: white; border: none;
      border-radius: 8px; font-size: 16px; cursor: pointer;
    }
    .input-row button:hover { background: #357abd; }
    .todo-list { list-style: none; }
    .todo-list li {
      display: flex; align-items: center; padding: 12px 16px; background: white;
      border-radius: 8px; margin-bottom: 8px;
    }
    .todo-list li label {
      flex: 1; display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 16px;
    }
    .todo-list li input[type="checkbox"] {
      width: 20px; height: 20px; cursor: pointer; accent-color: #4a90d9;
    }
    .todo-list li.done span { text-decoration: line-through; color: #999; }
    .todo-list li .delete {
      background: none; border: none; font-size: 20px; color: #ccc;
      cursor: pointer; padding: 0 4px;
    }
    .todo-list li .delete:hover { color: #e74c3c; }
    .empty { text-align: center; color: #999; padding: 40px 0; font-size: 16px; }
    .footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 16px; padding: 12px 16px; color: #999; font-size: 14px;
    }
    .footer .clear {
      background: none; border: none; color: #4a90d9; cursor: pointer;
      font-size: 14px; text-decoration: underline;
    }
    .footer .clear:hover { color: #357abd; }
  </style>
</head>
<body>
  <div class="app">
    <h1>Todo</h1>
    <div class="input-row">
      <input id="input" placeholder="What needs to be done?" autofocus />
      <button id="addBtn">Add</button>
    </div>
    <ul id="list" class="todo-list"></ul>
    <p id="empty" class="empty">Nothing to do.</p>
    <div id="footer" class="footer" style="display:none">
      <span id="count"></span>
      <button id="clearBtn" class="clear">Clear done</button>
    </div>
  </div>
  <script>
    const STORAGE_KEY = 'todos';
    let todos = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

    const input = document.getElementById('input');
    const addBtn = document.getElementById('addBtn');
    const list = document.getElementById('list');
    const empty = document.getElementById('empty');
    const footer = document.getElementById('footer');
    const count = document.getElementById('count');
    const clearBtn = document.getElementById('clearBtn');

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    }

    function render() {
      list.innerHTML = '';
      todos.forEach(todo => {
        const li = document.createElement('li');
        li.className = todo.done ? 'done' : '';
        li.innerHTML = `
          <label>
            <input type="checkbox" ${todo.done ? 'checked' : ''} />
            <span>${escapeHtml(todo.text)}</span>
          </label>
          <button class="delete">×</button>
        `;
        li.querySelector('input').addEventListener('change', () => {
          todo.done = !todo.done;
          save();
          render();
        });
        li.querySelector('.delete').addEventListener('click', () => {
          todos = todos.filter(t => t !== todo);
          save();
          render();
        });
        list.appendChild(li);
      });

      const doneCount = todos.filter(t => t.done).length;
      empty.style.display = todos.length ? 'none' : 'block';
      footer.style.display = todos.length ? 'flex' : 'none';
      count.textContent = `${doneCount} / ${todos.length} done`;
      clearBtn.style.display = doneCount ? 'block' : 'none';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    addBtn.addEventListener('click', addTodo);
    input.addEventListener('keyup', e => { if (e.key === 'Enter') addTodo(); });
    clearBtn.addEventListener('click', () => {
      todos = todos.filter(t => !t.done);
      save();
      render();
    });

    render();
  </script>
</body>
</html>
